<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phocus</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <header class="hero">
      <div class="hero-row">
        <div class="hero-brand">
          <img src="icons/phocus.svg" alt="phocus" class="hero-logo">
          <p class="hero-copy">Stay locked in gang...</p>
        </div>
        <div class="hero-mark" aria-hidden="true"></div>
      </div>
    </header>

    <section class="timer-panel" aria-labelledby="timer-heading">
      <div class="section-heading">
        <div>
          <h2 id="timer-heading">Current session</h2>
        </div>
        <span id="timerStatus" class="status-badge status-idle">Not started</span>
      </div>

      <div class="timer-display-wrap">
        <div id="timerDisplay" class="timer-display" aria-live="polite">25:00</div>
      </div>

      <div class="button-row">
        <button id="startBtn" class="btn btn-primary">Start Phocus</button>
        <button id="restartBtn" class="btn btn-secondary">Reset Phocus</button>
      </div>
    </section>

    <section class="sites-panel" aria-labelledby="blocked-sites-heading">
      <div class="section-heading section-heading-stack">
        <div>
          <h2 id="blocked-sites-heading">Blocked Sites</h2>
        </div>
      </div>

    <div class="site-input-row">
  <input 
    id="siteInput" 
    type="text" 
    inputmode="url" 
    placeholder="Enter site (e.g., facebook.com)" 
    aria-label="Site to block"
  >
  
  
  <img 
    id="siteFavicon" 
    alt="" 
    aria-hidden="true"
    style="
      width: 32px; 
      height: 32px; 
      display: none; 
      border-radius: 4px;
      object-fit: contain;
    "
  >
  
  <button 
    id="addSiteBtn" 
    class="icon-btn" 
    aria-label="Add blocked site"
  >
    <span aria-hidden="true">+</span>
  </button>
</div>

<p id="emptyState" class="empty-state">No sites blocked yet. Add one to build your phocus list.</p>
<ul id="blockedSitesList" class="site-list" aria-live="polite"></ul>
  </main>

  <script src="popup.js"></script>
</body>
</html>
