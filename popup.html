<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=3.0">
    <title>popup</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <h1>Hocus Pocus PHocus</h1>
    <div id="popup-container">
  
  <div id="timer-section">
    <div id="timer-display">25:00</div>
    <button id="startButton">Start Focus</button>
  </div>
  
  <div id="blocklist-section">
    <input id="siteInput" placeholder="Enter site (e.g., facebook.com)">
    <button id="addSiteButton">Add Site</button>
    
    <ul id="blockedSitesList">
      <li>facebook.com <button class="deleteBtn">×</button></li>
      <li>youtube.com <button class="deleteBtn">×</button></li>
    </ul>
  </div>
  
</div>

<script src = "popup.js"></script>         
</body>
</html>
